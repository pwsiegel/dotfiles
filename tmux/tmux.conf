set -g prefix C-a
bind C-a send-prefix
bind C-a last-window

set-option -g mouse on

# List of plugins: to install use `<prefix> I`
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'jimeh/tmux-themepack'

# Theme
set -g @themepack 'powerline/double/cyan'

# Show git repo name in status bar (replaces hostname)
set -g @themepack-status-right-area-right-format "#(basename $(git -C #{pane_current_path} rev-parse --show-toplevel 2>/dev/null) 2>/dev/null)"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
